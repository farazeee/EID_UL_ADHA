<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Eid Mubarak</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
background:black;
color:white;
perspective:2000px;
}

/* Premium Background */

body::before{
content:'';
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at center,
rgba(0,255,150,0.18),
transparent 60%),
radial-gradient(circle at top,
rgba(255,255,255,0.08),
transparent 40%),
black;
animation:bgMove 8s infinite alternate;
z-index:-5;
}

@keyframes bgMove{
0%{
transform:scale(1);
}
100%{
transform:scale(1.1);
}
}

/* Stars */

.star{
position:absolute;
color:white;
animation:blink 2s infinite alternate;
}

@keyframes blink{
from{
opacity:0.2;
transform:scale(0.5);
}
to{
opacity:1;
transform:scale(1.3);
}
}

/* Moon */

.moon{
position:absolute;
top:40px;
right:60px;
width:140px;
height:140px;
border-radius:50%;
background:#fff5c2;
box-shadow:
0 0 40px #fff5c2,
0 0 120px #fff5c2;
animation:moonMove 5s infinite ease-in-out;
}

@keyframes moonMove{
0%{
transform:translateY(0px);
}
50%{
transform:translateY(-12px);
}
100%{
transform:translateY(0px);
}
}

/* Start Page */

#startPage{
text-align:center;
animation:fadeIn 1.5s;
}

@keyframes fadeIn{
from{
opacity:0;
transform:scale(0.5);
}
to{
opacity:1;
transform:scale(1);
}
}

input{
width:340px;
padding:20px;
border:none;
outline:none;
border-radius:20px;
font-size:24px;
text-align:center;
background:#111;
color:white;
box-shadow:
0 0 20px #00ff99,
0 0 80px #00ff99;
}

button{
margin-top:25px;
padding:16px 50px;
border:none;
border-radius:20px;
font-size:22px;
font-weight:bold;
background:#00ff99;
color:black;
cursor:pointer;
transition:0.4s;
box-shadow:
0 0 30px #00ff99;
}

button:hover{
transform:scale(1.08);
}

/* Wish Page */

#wishPage{
display:none;
position:absolute;
width:100%;
height:100%;
text-align:center;
padding-top:60px;
transform-style:preserve-3d;
}

/* Main Wish */

.mainWish{
font-size:90px;
font-weight:900;
color:#00ff99;
text-shadow:
0 0 20px #00ff99,
0 0 60px #00ff99,
0 0 150px #00ff99;
animation:mainAnim 4s infinite;
}

@keyframes mainAnim{
0%{
transform:
rotateX(0deg)
rotateY(0deg)
scale(1);
}
50%{
transform:
rotateX(10deg)
rotateY(10deg)
scale(1.05);
}
100%{
transform:
rotateX(0deg)
rotateY(0deg)
scale(1);
}
}

/* Name */

.person{
margin-top:20px;
font-size:60px;
color:gold;
text-shadow:
0 0 20px gold,
0 0 80px gold;
animation:glow 2s infinite;
}

@keyframes glow{
0%{
transform:scale(1);
}
50%{
transform:scale(1.05);
}
100%{
transform:scale(1);
}
}

/* Message */

.message{
margin:auto;
margin-top:50px;
width:85%;
max-width:1000px;
padding:40px;
border-radius:35px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
box-shadow:
0 0 40px #00ff99,
0 0 100px #ff00ff;
animation:zoomIn 2s;
}

@keyframes zoomIn{
from{
opacity:0;
transform:
scale(0.5)
rotateX(90deg);
}
to{
opacity:1;
transform:
scale(1)
rotateX(0deg);
}
}

.messageText{
font-size:35px;
line-height:2;
}

/* Footer */

.footer{
margin-top:25px;
font-size:38px;
color:gold;
text-shadow:
0 0 20px gold;
}

/* Fireworks */

.effect{
position:absolute;
animation:blast 4s linear forwards;
pointer-events:none;
}

@keyframes blast{
from{
transform:
scale(0)
rotate(0deg);
opacity:1;
}
to{
transform:
scale(4)
rotate(720deg);
opacity:0;
}
}

</style>
</head>

<body>

<!-- Full Screen Desktop Mode -->

<script>

window.onload=function(){

document.documentElement.requestFullscreen();

}

</script>

<!-- Moon -->

<div class="moon"></div>

<!-- Stars -->

<script>

for(let i=0;i<250;i++){

let star=document.createElement('div');

star.className='star';

star.innerHTML='✦';

star.style.left=Math.random()*100+'vw';

star.style.top=Math.random()*100+'vh';

star.style.fontSize=
(10+Math.random()*25)+'px';

document.body.appendChild(star);

}

</script>

<!-- Start Page -->

<div id="startPage">

<input
type="text"
id="username"
placeholder="Enter Your Name">

<br>

<button onclick="showWish()">
Continue
</button>

</div>

<!-- Wish Page -->

<div id="wishPage">

<div class="mainWish">
🌙 EID MUBARAK 🌙
</div>

<div class="person" id="personName"></div>

<div class="message">

<div class="messageText">

✨ May Allah bless your life
with happiness, peace,
success and endless joy ✨

<br><br>

🤲 May your prayers be accepted
and your heart stay happy forever 🤲

<br><br>

💖 Wishing you a beautiful
and joyful Eid Ul Adha 💖

<br><br>

🎆 Enjoy Every Special Moment 🎆

</div>

<div class="footer">
✨ Regards Faraz Ali Jumani ✨
</div>

</div>

</div>

<!-- REAL FIREWORK SOUND -->

<audio id="fireworks"
src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6f5325f879.mp3?filename=fireworks-29629.mp3">
</audio>

<script>

/* Show Wish */

function showWish(){

let name=
document.getElementById('username').value;

if(name==""){

alert("Please Enter Your Name");

return;

}

/* Hide Start */

document.getElementById('startPage').style.display='none';

/* Show Wish */

document.getElementById('wishPage').style.display='block';

/* Show Name */

document.getElementById('personName').innerHTML=
'💚 '+name+' 💚';

/* Play Fireworks Sound */

let sound=
document.getElementById('fireworks');

sound.volume=1;

sound.play();

/* Fireworks Effects */

for(let i=0;i<450;i++){

let effect=
document.createElement('div');

effect.className='effect';

effect.innerHTML=
['🎆','✨','💥','🌟','🔥']
[Math.floor(Math.random()*5)];

effect.style.left=
Math.random()*100+'vw';

effect.style.top=
Math.random()*100+'vh';

effect.style.fontSize=
(20+Math.random()*80)+'px';

effect.style.animationDuration=
(2+Math.random()*4)+'s';

document.body.appendChild(effect);

setTimeout(()=>{
effect.remove();
},5000);

}

}

</script>

</body>
</html>
